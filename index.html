<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berg Boligfoto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #f0f0f0; font-family: 'Georgia', serif; }
        
        nav {
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .logo { font-size: 1.4rem; letter-spacing: 3px; text-transform: uppercase; }
        .nav-links a {
            color: #f0f0f0;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #111;
        }
        .hero h1 { font-size: 3rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 1rem; }
        .hero p { font-size: 1rem; letter-spacing: 2px; color: #888; text-transform: uppercase; }

        .about {
            padding: 5rem 3rem;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .about h2 { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 2rem; }
        .about p { line-height: 1.9; color: #ccc; font-size: 1rem; }

        .contact {
            padding: 5rem 3rem;
            text-align: center;
            border-top: 1px solid #222;
        }
        .contact h2 { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 1rem; }
        .contact a { color: #f0f0f0; font-size: 1.1rem; }

        footer {
            padding: 2rem;
            text-align: center;
            color: #444;
            font-size: 0.8rem;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Berg Boligfoto</div>
        <div class="nav-links">
            <a href="#om">Om</a>
            <a href="#kontakt">Kontakt</a>
        </div>
    </nav>

    <section class="hero">
        <div>
            <h1>Berg Boligfoto</h1>
            <p>Profesjonell eiendomsfotografi – Levanger & omegn</p>
        </div>
    </section>

    <section class="about" id="om">
        <h2>Om meg</h2>
        <p>Skriv litt om deg selv her. Hvem er du, hva driver du med, og hvorfor skal meglere velge deg?</p>
    </section>

    <section class="contact" id="kontakt">
        <h2>Kontakt</h2>
        <a href="mailto:hei@bergboligfoto.no">hei@bergboligfoto.no</a>
    </section>

    <footer>
        <p>© 2025 Berg Boligfoto</p>
    </footer>

</body>
</html>
